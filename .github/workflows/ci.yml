name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint cost-optimization scripts
        run: bash -n cost-optimization/scripts/*.sh

      - name: Lint brainofbrains scripts
        run: bash -n brainofbrains/scripts/*.sh

      - name: Lint elasticjudge scripts
        run: bash -n elasticjudge/scripts/*.sh

      - name: Lint root scripts
        run: bash -n scripts/*.sh

  validate-skill-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md frontmatter
        run: |
          failed=0
          for skill_md in */SKILL.md; do
            if ! grep -q '^name:' "$skill_md"; then
              echo "MISSING 'name:' in $skill_md"
              failed=1
            fi
            if ! grep -q '^description:' "$skill_md"; then
              echo "MISSING 'description:' in $skill_md"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more SKILL.md files are missing required frontmatter fields."
            exit 1
          fi
          echo "All SKILL.md files pass frontmatter validation."

      - name: Check CHANGELOG exists
        run: test -f CHANGELOG.md

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: ShellCheck cost-optimization scripts
        run: shellcheck -S warning cost-optimization/scripts/*.sh
      - name: ShellCheck brainofbrains scripts
        run: shellcheck -S warning brainofbrains/scripts/*.sh
      - name: ShellCheck elasticjudge scripts
        run: shellcheck -S warning elasticjudge/scripts/*.sh
      - name: ShellCheck root scripts
        run: shellcheck -S warning scripts/*.sh

  pulser:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run Pulser skill linter
        run: npx --yes pulser-cli . --format json --no-anim --strict

  validate-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check examples directory
        run: |
          ls examples/
          test -f examples/sample-memo.md
          test -f examples/sample-proof.md
          test -f examples/test-prompts.md
